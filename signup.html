<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 550px;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border);
            z-index: 1;
            transform: translateY(-50%);
        }

        .step-indicator {
            width: 35px;
            height: 35px;
            background: var(--border);
            color: var(--text-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .step-indicator.active {
            background: var(--primary);
            color: white;
        }

        .form-page {
            display: none;
        }

        .form-page.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: var(--text);
        }

        /* Radio & Checkbox Styling */
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .radio-label, .checkbox-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .radio-label:hover, .checkbox-label:hover {
            border-color: var(--primary);
            background-color: #f9fafb;
        }

        input[type="radio"], input[type="checkbox"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .catalog-container {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Summary & Payment Info */
        .payment-box {
            background: #f9fafb;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .total-row {
            border-top: 2px solid var(--border);
            padding-top: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary);
        }

        /* Buttons */
        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
        }
    </style>
</head>
<body>

<div class="form-container">
    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="step-indicator active">1</div>
        <div class="step-indicator">2</div>
        <div class="step-indicator">3</div>
        <div class="step-indicator">4</div>
    </div>

    <form id="signupForm" onsubmit="handleFormSubmit(event)">
        
        <!-- Page 1: Account Type -->
        <div class="form-page active" id="page-1">
            <h2>Select Account Type</h2>
            <div class="option-group">
                <label class="radio-label">
                    <input type="radio" name="accountType" value="shared" checked>
                    <div>
                        <strong>Shared Account</strong>
                        <div style="font-size: 0.85rem; color: var(--text-light);">Access shared profiles or individual slots.</div>
                    </div>
                </label>
                <label class="radio-label">
                    <input type="radio" name="accountType" value="private">
                    <div>
                        <strong>Private Account</strong>
                        <div style="font-size: 0.85rem; color: var(--text-light);">Full standalone premium accounts.</div>
                    </div>
                </label>
            </div>
            <div class="btn-container">
                <div></div> <!-- Spacer -->
                <button type="button" class="btn btn-primary" onclick="goToPage(2)">NEXT</button>
            </div>
        </div>

        <!-- Page 2: Catalog -->
        <div class="form-page" id="page-2">
            <h2>Select Services</h2>
            <div class="catalog-container option-group" id="catalogList">
                <!-- JavaScript injects options here -->
            </div>
            <div class="btn-container">
                <button type="button" class="btn btn-secondary" onclick="goToPage(1)">Back</button>
                <button type="button" class="btn btn-primary" onclick="goToPage(3)">NEXT</button>
            </div>
        </div>

        <!-- Page 3: Payment -->
        <div class="form-page" id="page-3">
            <h2>Make Payment</h2>
            <div class="payment-box">
                <div id="orderSummary">
                    <!-- JavaScript injects summary here -->
                </div>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-light); text-align: center; margin-bottom: 15px;">
                Please proceed with your mobile money or card transfer based on the total above.
            </p>
            <div class="btn-container">
                <button type="button" class="btn btn-secondary" onclick="goToPage(2)">Back</button>
                <button type="button" class="btn btn-primary" onclick="goToPage(4)">NEXT</button>
            </div>
        </div>

        <!-- Page 4: Contact Details -->
        <div class="form-page" id="page-4">
            <h2>Contact Details</h2>
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" id="phoneNumber" required placeholder="e.g. 0970000000">
            </div>
            <div class="input-group">
                <label for="emailAddress">Email Address</label>
                <input type="email" id="emailAddress" required placeholder="john@example.com">
            </div>
            <div class="btn-container">
                <button type="button" class="btn btn-secondary" onclick="goToPage(3)">Back</button>
                <button type="submit" class="btn btn-primary">SUBMIT</button>
            </div>
        </div>

    </form>
</div>

<script>
    // Embedded JSON PriceList data
    const priceListData = {
        "shared": [
            {"service": "Netflix Premium (shared profiles)", "price": 65},
            {"service": "Netflix Premium (private profile)", "price": 100},
            {"service": "Prime video (All devices)", "price": 80},
            {"service": "DSTV Stream (2 weeks)", "price": 150},
            {"service": "Spotify", "price": 60},
            {"service": "Apple Music slot", "price": 80},
            {"service": "iCloud storage (50GB)", "price": 50},
            {"service": "iCloud storage (200GB)", "price": 80},
            {"service": "Music distribution (Spotify, Apple, Amazon...)", "price": 100},
            {"service": "Music cover art / Logo design", "price": 50},
            {"service": "Gemini AI Plus", "price": 50},
            {"service": "Other Services", "price": 0}
        ],
        "private": [
            {"service": "Netflix (Mobile)", "price": 160},
            {"service": "Netflix (Basic)", "price": 250},
            {"service": "Netflix (Standard)", "price": 350},
            {"service": "Netflix (Premium)", "price": 399},
            {"service": "DSTV STREAM (Promo 🔥)", "price": 250},
            {"service": "Amazon Prime Video", "price": 250},
            {"service": "Spotify (Individual)", "price": 150},
            {"service": "Spotify (Family)", "price": 250},
            {"service": "Apple Music (Individual)", "price": 180},
            {"service": "Apple Music (Family)", "price": 300},
            {"service": "iCloud storage (50GB)", "price": 80},
            {"service": "iCloud storage (200GB)", "price": 150},
            {"service": "iCloud storage (2 TB)", "price": 300},
            {"service": "Gemini AI (plus)", "price": 100},
            {"service": "Gemini AI (pro)", "price": 150},
            {"service": "Chat-GPT AI (Go)", "price": 150},
            {"service": "Other Services", "price": 0}
        ]
    };

    let currentPage = 1;

    function goToPage(pageNumber) {
        // If moving to page 2, dynamically generate the specific catalog items
        if (pageNumber === 2 && currentPage === 1) {
            generateCatalog();
        }
        
        // If moving to page 3, compute the chosen selections for order confirmation
        if (pageNumber === 3) {
            const total = generateSummary();
            if (total === 0) {
                alert("Please select at least one item from the catalog.");
                return;
            }
        }

        // Hide current active page
        document.getElementById(`page-${currentPage}`).classList.remove('active');
        // Show new page
        document.getElementById(`page-${pageNumber}`).classList.add('active');
        
        currentPage = pageNumber;
        updateProgressIndicators();
    }

    function updateProgressIndicators() {
        const indicators = document.querySelectorAll('.step-indicator');
        indicators.forEach((indicator, index) => {
            if (index < currentPage) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        });
    }

    function generateCatalog() {
        const accountType = document.querySelector('input[name="accountType"]:checked').value;
        const catalogContainer = document.getElementById('catalogList');
        catalogContainer.innerHTML = ''; // clear previous rendering

        const list = priceListData[accountType];
        list.forEach((item, index) => {
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            
            const priceText = item.price > 0 ? `K${item.price}` : 'Quote on Request';
            
            label.innerHTML = `
                <input type="checkbox" name="services" value="${index}" data-price="${item.price}" data-name="${item.service}">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span>${item.service}</span>
                    <strong>${priceText}</strong>
                </div>
            `;
            catalogContainer.appendChild(label);
        });
    }

    function generateSummary() {
        const checkedBoxes = document.querySelectorAll('input[name="services"]:checked');
        const summaryContainer = document.getElementById('orderSummary');
        summaryContainer.innerHTML = '';
        
        let total = 0;

        checkedBoxes.forEach(box => {
            const name = box.getAttribute('data-name');
            const price = parseFloat(box.getAttribute('data-price'));
            total += price;

            const row = document.createElement('div');
            row.className = 'summary-item';
            row.innerHTML = `<span>${name}</span> <span>K${price}</span>`;
            summaryContainer.appendChild(row);
        });

        const totalRow = document.createElement('div');
        totalRow.className = 'summary-item total-row';
        totalRow.innerHTML = `<span>Total Due:</span> <span>K${total}</span>`;
        summaryContainer.appendChild(totalRow);

        return total;
    }

    function handleFormSubmit(event) {
        event.preventDefault();
        
        // Grab values if needed later
        const name = document.getElementById('fullName').value;
        const phone = document.getElementById('phoneNumber').value;
        const email = document.getElementById('emailAddress').value;

        alert(`Thank you, ${name}! Your request has been configured. (Form submission intercepted - data not saved).`);
    }
</script>

</body>
</html>
